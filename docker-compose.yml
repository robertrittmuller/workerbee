
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: workerbee-postgres
    environment:
      POSTGRES_USER: workerbee
      POSTGRES_PASSWORD: workerbee_secret
      POSTGRES_DB: workerbee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workerbee"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workerbee-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: workerbee-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - workerbee-network

  # Redis for caching and task queues
  redis:
    image: redis:7-alpine
    container_name: workerbee-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workerbee-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workerbee-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://workerbee:workerbee_secret@postgres:5432/workerbee
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin_secret
      - SECRET_KEY=your-super-secret-key-change-in-production
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - LLM_AVAILABLE_MODELS=${LLM_AVAILABLE_MODELS:-}
      - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SANDBOX_API_BASE_URL=${SANDBOX_API_BASE_URL:-http://sandbox:9000}
      - SANDBOX_WORKSPACE_ROOT=${SANDBOX_WORKSPACE_ROOT:-/workspace}
      - SANDBOX_TIMEOUT=${SANDBOX_TIMEOUT:-1800}
      - SANDBOX_HTTP_TIMEOUT=${SANDBOX_HTTP_TIMEOUT:-120}
      - SANDBOX_CAPABILITY_CACHE_SECONDS=${SANDBOX_CAPABILITY_CACHE_SECONDS:-300}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - opencode_workspace:/workspace
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - workerbee-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: workerbee-frontend
    environment:
      - VITE_API_URL=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - workerbee-network

  # OpenCode Server Container
  opencode:
    build:
      context: ./opencode
      dockerfile: Dockerfile
    container_name: workerbee-opencode
    volumes:
      - ./opencode:/root/.config/opencode
      - opencode_workspace:/workspace
    environment:
      - OPENCODE_SERVER_PASSWORD=workerbee_secret
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://openrouter.ai/api/v1}
    ports:
      - "4096:4096"
    networks:
      - workerbee-network

volumes:
  postgres_data:
  minio_data:
  redis_data:
  backend_uploads:
  opencode_workspace:

networks:
  workerbee-network:
    driver: bridge
